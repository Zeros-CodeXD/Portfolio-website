<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEROS | Software & AI Engineer</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        /* --- GLOBAL VARIABLES --- */
        :root {
            --bg-base: #050505;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --cyan: #00e5ff;
            --gold: #FFD700;
            --text-main: #f0f0f0;
            --text-muted: #a0a0a0;
        }

        html { scroll-behavior: smooth; }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        /* --- VIDEO BACKGROUND & OVERLAY --- */
        #bg-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(5, 5, 5, 0.85); /* Heavy dark tint for text readability */
            z-index: -1;
        }

        /* --- NAVBAR --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 10%;
            animation: fadeInDown 1s ease;
            position: relative;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: white;
            text-decoration: none;
        }
        
        .logo span { color: var(--gold); }

        .nav-btn {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            will-change: transform, box-shadow;
        }

        .nav-btn:hover {
            border-color: var(--cyan);
            color: var(--cyan);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
            transform: translateY(-2px);
        }

        /* --- HERO SECTION --- */
        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 60vh;
            padding: 0 20px;
            animation: fadeInUp 1s ease;
            position: relative;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 229, 255, 0.1);
            backdrop-filter: blur(5px);
            color: var(--cyan);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 229, 255, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--cyan);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--cyan);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .hero h1 {
            font-size: 4.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            font-weight: 300;
        }

        /* --- SECTIONS & GLASSMORPHISM --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 50px 20px;
            position: relative;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 40px;
            color: white;
            display: flex;
            align-items: center;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--glass-border);
            margin-left: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 35px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            will-change: transform, border-color;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 229, 255, 0.4);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 229, 255, 0.05);
        }

        .card-icon { font-size: 2rem; margin-bottom: 20px; }
        .card h3 { font-size: 1.5rem; margin-bottom: 15px; color: white; }
        
        .card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
            flex-grow: 1;
        }

</head>
